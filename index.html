<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Admin | System Toolkit</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #111;
            --accent: #3b82f6;
            --text: #e5e7eb;
            --dim: #9ca3af;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(#1f2937 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            padding: 3rem;
            background: var(--surface);
            border: 1px solid #222;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: var(--dim); margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Absolute Admin</h1>
        <p>A research-oriented Windows management suite for system admins and developers.</p>
        
        <a href="Absolute_Admin_Full_Project.zip" 
           target="_blank" 
           onclick="setTimeout(function(){ window.location.href='downloaded.html'; }, 500);" 
           class="btn">Download v1.0.0</a>
    </div>
</body>
</html>
